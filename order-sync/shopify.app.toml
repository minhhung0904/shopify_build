# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
#
# `client_id` and `application_url` are filled in by `shopify app config link`
# once the app exists in the Partner Dashboard.

client_id = ""
application_url = "https://example.com"
embedded = true
name = "OrderSync"

[access_scopes]
# read_orders is what the orders/create webhook requires.
scopes = "read_orders"
optional_scopes = [ ]
use_legacy_install_flow = false

[webhooks]
api_version = "2026-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/create"
  topics = [ "orders/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # Mandatory for any app distributed to other merchants.
  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  topics = [ "shop/redact" ]

[auth]
redirect_urls = [ "https://example.com/auth/callback" ]

[build]
automatically_update_urls_on_dev = true
