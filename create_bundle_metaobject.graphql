# Chạy 1 lần để tạo kiểu nội dung "Bundle" trong Admin -> Content -> Metaobjects.
# Cách chạy: shopify store execute --store <your-store>.myshopify.com --file create_bundle_metaobject.graphql
# (cần quyền: write_metaobject_definitions)
# Sau khi tạo xong, bạn thêm/sửa bundle trực tiếp qua Admin UI, không cần GraphQL nữa.

mutation CreateBundleDefinition($definition: MetaobjectDefinitionCreateInput!) {
  metaobjectDefinitionCreate(definition: $definition) {
    metaobjectDefinition {
      id
      name
      type
      fieldDefinitions {
        name
        key
        type {
          name
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}

