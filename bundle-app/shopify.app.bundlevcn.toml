# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "ee5c4f985ace5900a20391adc0e1d6e6"
application_url = "https://shopify-build.onrender.com"
embedded = true
name = "BundleVCN"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,write_metaobjects,write_metaobject_definitions"
optional_scopes = [ ]
use_legacy_install_flow = false

[metaobjects.app.bundle]
name = "Bundle"
display_name_field = "title"

  [metaobjects.app.bundle.access]
  admin = "merchant_read_write"
  storefront = "public_read"

[metaobjects.app.bundle.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.bundle.fields.badge_text]
name = "Badge text"
type = "single_line_text_field"

[metaobjects.app.bundle.fields.image]
name = "Image"
type = "file_reference"

[metaobjects.app.bundle.fields.products]
name = "Products"
type = "list.product_reference"
required = true

[metaobjects.app.bundle.fields.price]
name = "Bundle price"
type = "number_decimal"

[metaobjects.app.bundle.fields.description]
name = "Description"
type = "multi_line_text_field"

[webhooks]
api_version = "2026-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [ "https://shopify-build.onrender.com/auth/callback" ]

[build]
automatically_update_urls_on_dev = true
